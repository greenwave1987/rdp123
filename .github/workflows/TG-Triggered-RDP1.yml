name: TG-Triggered-RDP1

on:
  repository_dispatch:
    types: [open_rdp]

env:
  RDP_USER:      RDP
  TAILSCALE_BIN: "C:\\Program Files\\Tailscale\\tailscale.exe"
  CALLBACK_URL:  https://tg-github-bot.greenwave1987.workers.dev/callback
  DEFAULT_DURATION_MIN: 60

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      # ── 1. 启用 RDP ──────────────────────────────────────────────────────
      - name: Enable RDP
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -Value 0 -Force
          $rdpPath = 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp'
          Set-ItemProperty -Path $rdpPath -Name UserAuthentication -Value 1 -Force
          Set-ItemProperty -Path $rdpPath -Name SecurityLayer -Value 2 -Force
          
          $ruleName = 'RDP-Tailscale'
          Remove-NetFirewallRule -DisplayName $ruleName -ErrorAction SilentlyContinue
          New-NetFirewallRule -DisplayName $ruleName -Direction Inbound -Protocol TCP -LocalPort 3389 -RemoteAddress 100.64.0.0/10 -Action Allow -Profile Any | Out-Null
          Restart-Service TermService -Force
          Write-Host "✅ RDP 已配置"

      # ── 2. 创建 RDP 用户 ─────────────────────────────────────────────────
      - name: Create RDP User
        shell: pwsh
        env:
          RDP_PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          Write-Host "::add-mask::$env:RDP_PASSWORD"
          $securePass = ConvertTo-SecureString $env:RDP_PASSWORD -AsPlainText -Force
          if (-not (Get-LocalUser -Name $env:RDP_USER -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name $env:RDP_USER -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          } else {
              Set-LocalUser -Name $env:RDP_USER -Password $securePass
          }
          foreach ($group in 'Administrators', 'Remote Desktop Users') {
              Add-LocalGroupMember -Group $group -Member $env:RDP_USER -ErrorAction SilentlyContinue
          }

      # ── 3. 安装并连接 Tailscale ──────────────────────────────────────────
      - name: Install and Connect Tailscale
        shell: pwsh
        env:
          TS_AUTHKEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          Write-Host "::add-mask::$env:TS_AUTHKEY"
          $installer = Join-Path $env:TEMP 'tailscale.msi'
          Invoke-WebRequest -Uri 'https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi' -OutFile $installer -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i `"$installer`" /quiet /norestart" -Wait

          & "$env:TAILSCALE_BIN" up --authkey="$env:TS_AUTHKEY" --hostname='rdp' --reset
          
          $tsIP = $null
          for ($i = 0; $i -lt 15; $i++) {
              Start-Sleep 2
              $tsIP = & "$env:TAILSCALE_BIN" ip -4 2>$null
              if ($tsIP -match '^\d+\.\d+\.\d+\.\d+$') { break }
          }
          if (-not $tsIP) { throw "❌ Tailscale IP 获取失败" }
          "TAILSCALE_IP=$tsIP" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "✅ Tailscale IP: $tsIP"

      # ── 4. 回调 Telegram ─────────────────────────────────────────────────
      - name: Notify Telegram
        if: always()
        shell: pwsh
        run: |
          $payload = "IP:$($env:TAILSCALE_IP)|ID:${{ github.event.client_payload.chat_id }}|TIME:${{ github.event.client_payload.duration }}"
          $encoded = [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($payload))
          $body = @{ payload = $encoded } | ConvertTo-Json
          try {
              Invoke-RestMethod -Uri $env:CALLBACK_URL -Method Post -ContentType 'application/json' -Body $body -TimeoutSec 15
          } catch { Write-Warning "⚠️ 回调失败" }

      # ── 5. 安装并运行 Mihomo ─────────────────────────────────────────────
      - name: Install and Run Mihomo
        shell: pwsh
        run: |
          $mihomoDir = "C:\Mihomo"
          if (-not (Test-Path $mihomoDir)) { New-Item -ItemType Directory -Path $mihomoDir -Force }
          
          # 下载
          $dlUrl = "https://github.com/MetaCubeX/mihomo/releases/download/v1.18.9/mihomo-windows-amd64-v1.18.9.zip"
          $zipFile = Join-Path $mihomoDir "mihomo.zip"
          Invoke-WebRequest -Uri $dlUrl -OutFile $zipFile -UseBasicParsing
          
          # 解压
          & 7z x $zipFile -o$mihomoDir -y | Out-Null
          
          # 直接查找目录下的第一个 exe 文件，不再管它叫什么名字
          $foundExe = Get-ChildItem -Path $mihomoDir -Filter "*.exe" -Recurse | Select-Object -First 1
          
          if ($null -eq $foundExe) { throw "❌ 找不到 exe 文件" }
          
          # 重命名为 mihomo.exe 方便调用
          $finalExe = Join-Path $mihomoDir "mihomo.exe"
          if ($foundExe.FullName -ne $finalExe) {
              Move-Item -Path $foundExe.FullName -Destination $finalExe -Force
          }

          # 写入配置文件
          $configLines = @(
            "mixed-port: 7890",
            "allow-lan: true",
            "mode: rule",
            "log-level: info",
            "external-controller: 0.0.0.0:9090",
            "secret: ''",
            "proxies: []",
            "proxy-groups:",
            "  - name: PROXY",
            "    type: select",
            "    proxies:",
            "      - DIRECT",
            "rules:",
            "  - MATCH,DIRECT"
          )
          $configLines | Set-Content -Path (Join-Path $mihomoDir "config.yaml") -Encoding UTF8

          # 后台运行
          Start-Process -FilePath $finalExe -ArgumentList "-d $mihomoDir" -WindowStyle Hidden
          Write-Host "✅ Mihomo 已就绪"

      # ── 6. 保持存活 ──────────────────────────────────────────────────────
      - name: Keep Alive
        shell: pwsh
        run: |
          $raw = "${{ github.event.client_payload.duration }}"
          $min = if ([string]::IsNullOrWhiteSpace($raw) -or -not [int]::TryParse($raw, [ref]$null)) { [int]$env:DEFAULT_DURATION_MIN } else { [int]$raw }
          $endTime = (Get-Date).AddMinutes([Math]::Min($min, 355))
          Write-Host "⏳ 保持存活直到: $endTime"
          while ((Get-Date) -lt $endTime) {
              $rem = [int]($endTime - (Get-Date)).TotalMinutes
              Write-Host "$(Get-Date -Format 'HH:mm:ss') 剩余 $rem 分钟"
              Start-Sleep 120
          }

      # ── 7. 清理 ──────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          try { & "$env:TAILSCALE_BIN" logout } catch {}
          Get-Process -Name "mihomo" -ErrorAction SilentlyContinue | Stop-Process -Force
          Remove-LocalUser -Name $env:RDP_USER -ErrorAction SilentlyContinue
