name: TG-Triggered-RDP1

on:
  repository_dispatch:
    types: [open_rdp]

env:
  RDP_USER:      RDP
  # 使用双引号定义，确保 PowerShell 在调用时能正确识别空格路径
  TAILSCALE_BIN: "C:\\Program Files\\Tailscale\\tailscale.exe"
  CALLBACK_URL:  https://tg-github-bot.greenwave1987.workers.dev/callback
  DEFAULT_DURATION_MIN: 60

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      # ── 1. 启用 RDP ──────────────────────────────────────────────────────
      - name: Enable RDP
        shell: pwsh
        run: |
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name fDenyTSConnections -Value 0 -Force

          $rdpPath = 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp'
          Set-ItemProperty -Path $rdpPath -Name UserAuthentication -Value 1 -Force
          Set-ItemProperty -Path $rdpPath -Name SecurityLayer       -Value 2 -Force

          $ruleName = 'RDP-Tailscale'
          Remove-NetFirewallRule -DisplayName $ruleName -ErrorAction SilentlyContinue
          New-NetFirewallRule `
            -DisplayName  $ruleName `
            -Direction    Inbound `
            -Protocol      TCP `
            -LocalPort    3389 `
            -RemoteAddress 100.64.0.0/10 `
            -Action        Allow `
            -Profile      Any | Out-Null

          Restart-Service TermService -Force
          Write-Host "✅ RDP 已启用 (Tailscale ACL 限定)"

      # ── 2. 创建 RDP 用户 ─────────────────────────────────────────────────
      - name: Create RDP User
        shell: pwsh
        env:
          RDP_PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          Write-Host "::add-mask::$env:RDP_PASSWORD"
          $securePass = ConvertTo-SecureString $env:RDP_PASSWORD -AsPlainText -Force

          if (-not (Get-LocalUser -Name $env:RDP_USER -ErrorAction SilentlyContinue)) {
              New-LocalUser `
                -Name                $env:RDP_USER `
                -Password            $securePass `
                -AccountNeverExpires `
                -PasswordNeverExpires
          } else {
              Set-LocalUser -Name $env:RDP_USER -Password $securePass
          }

          foreach ($group in 'Administrators', 'Remote Desktop Users') {
              Add-LocalGroupMember -Group $group -Member $env:RDP_USER -ErrorAction SilentlyContinue
          }
          Write-Host "✅ 用户 $env:RDP_USER 配置完成"

      # ── 3. 安装并连接 Tailscale ──────────────────────────────────────────
      - name: Install and Connect Tailscale
        shell: pwsh
        env:
          TS_AUTHKEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          Write-Host "::add-mask::$env:TS_AUTHKEY"
          $installer = Join-Path $env:TEMP 'tailscale.msi'
          $tsUrl     = 'https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi'

          Invoke-WebRequest -Uri $tsUrl -OutFile $installer -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i `"$installer`" /quiet /norestart" -Wait

          # 使用引号包裹路径调用
          & "$env:TAILSCALE_BIN" up --authkey="$env:TS_AUTHKEY" --hostname='github-rdp' --reset

          $tsIP = $null
          for ($i = 0; $i -lt 15; $i++) {
              Start-Sleep 2
              $tsIP = & "$env:TAILSCALE_BIN" ip -4 2>$null
              if ($tsIP -match '^\d+\.\d+\.\d+\.\d+$') { break }
          }
          
          if (-not $tsIP) { throw "❌ Tailscale 获取 IP 失败" }
          Write-Host "✅ Tailscale IP: $tsIP"
          "TAILSCALE_IP=$tsIP" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # ── 4. 回调 Telegram ─────────────────────────────────────────────────
      - name: Notify Telegram
        if: always()
        shell: pwsh
        run: |
          $chatId = "${{ github.event.client_payload.chat_id }}"
          $duration = "${{ github.event.client_payload.duration }}"
          $payload = "IP:$($env:TAILSCALE_IP)|ID:$chatId|TIME:$duration"
          $encoded = [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($payload))
          
          $body = @{ payload = $encoded } | ConvertTo-Json
          try {
              Invoke-RestMethod -Uri $env:CALLBACK_URL -Method Post -ContentType 'application/json' -Body $body -TimeoutSec 15
              Write-Host "✅ Telegram 回调成功"
          } catch {
              Write-Warning "⚠️ 回调失败: $_"
          }

      # ── 5. 安装 Clash for Windows (修复版下载链接) ────────────────────────
      - name: Install Clash for Windows
        shell: pwsh
        run: |
          # 使用 Z-Siqi 的汉化备份仓库，此链接目前依然有效
          $dlUrl = "https://github.com/Z-Siqi/Clash-for-Windows_Chinese/releases/download/0.20.39.3/Clash.for.Windows.Setup.0.20.39_Opt-3.exe"
          $installer = Join-Path $env:TEMP "clash-setup.exe"

          Write-Host "📦 正在下载 Clash (备份源)..."
          Invoke-WebRequest -Uri $dlUrl -OutFile $installer -UseBasicParsing

          Write-Host "⚙️ 正在静默安装..."
          $proc = Start-Process -FilePath $installer -ArgumentList '/S' -Wait -PassThru

          $cfwDir = "${env:LOCALAPPDATA}\Programs\Clash for Windows"
          if (-not (Test-Path $cfwDir)) { $cfwDir = "${env:ProgramFiles}\Clash for Windows" }
          $cfwExe = Join-Path $cfwDir 'Clash for Windows.exe'

          # 写入基础配置
          $profileDir = Join-Path $env:APPDATA 'clash'
          if (-not (Test-Path $profileDir)) { New-Item -ItemType Directory -Path $profileDir -Force }
          
          @"
          mixed-port: 7890
          allow-lan: true
          mode: rule
          log-level: warning
          external-controller: 127.0.0.1:9090
          proxies: []
          proxy-groups: []
          rules:
            - MATCH,DIRECT
          "@ | Out-File -FilePath (Join-Path $profileDir 'config.yaml') -Encoding utf8

          if (Test-Path $cfwExe) {
              Start-Process -FilePath $cfwExe -WindowStyle Minimized
              Write-Host "✅ Clash 已启动"
          }

      # ── 6. 保持存活 ──────────────────────────────────────────────────────
      - name: Keep Alive
        shell: pwsh
        run: |
          $rawDuration = "${{ github.event.client_payload.duration }}"
          $durationMin = if ([string]::IsNullOrWhiteSpace($rawDuration) -or -not [int]::TryParse($rawDuration, [ref]$null)) {
              [int]$env:DEFAULT_DURATION_MIN
          } else {
              [int]$rawDuration
          }

          $durationMin = [Math]::Min($durationMin, 355)
          $endTime = (Get-Date).AddMinutes($durationMin)
          Write-Host "⏳ 会话开始，结束时间: $endTime"

          while ((Get-Date) -lt $endTime) {
              $rem = [int]($endTime - (Get-Date)).TotalMinutes
              Write-Host "$(Get-Date -Format 'HH:mm:ss') - 剩余 $rem 分钟"
              Start-Sleep 120
          }

      # ── 7. 清理阶段 ──────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          try { & "$env:TAILSCALE_BIN" logout } catch { }
          Get-Process -Name 'Clash for Windows' -ErrorAction SilentlyContinue | Stop-Process -Force
          Disable-LocalUser -Name $env:RDP_USER -ErrorAction SilentlyContinue
          Remove-LocalUser -Name $env:RDP_USER -ErrorAction SilentlyContinue
          Write-Host "🧹 环境已清理"
