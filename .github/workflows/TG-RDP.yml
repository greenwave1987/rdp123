name: TG-RDP-v4

on:
  repository_dispatch:
    types: [open_rdp]

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 480

    steps:

    # -----------------------------
    - name: Enable RDP
      shell: powershell
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1 -Force
        netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389 remoteip=100.64.0.0/10
        Restart-Service TermService -Force

    # -----------------------------
    - name: Create RDP User
      shell: powershell
      run: |
        $pass="${{ secrets.PASSWORD }}"
        Write-Host "::add-mask::$pass"
        $secure=ConvertTo-SecureString $pass -AsPlainText -Force
        if(-not(Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue)){
          New-LocalUser -Name "RDP" -Password $secure -AccountNeverExpires
        }
        Add-LocalGroupMember Administrators RDP -ErrorAction SilentlyContinue
        Add-LocalGroupMember "Remote Desktop Users" RDP -ErrorAction SilentlyContinue

    # -----------------------------
    - name: Install Tailscale & Connect
      shell: powershell
      run: |
        $ErrorActionPreference="Continue"

        function SendTG($msg){
          try{
            $url="https://tg-github-bot.greenwave1987.workers.dev/callback"
            $enc=[Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($msg))
            Invoke-RestMethod -Uri $url -Method Post -TimeoutSec 15 -ContentType "application/json" -Body (@{payload=$enc}|ConvertTo-Json)
          }catch{
            Write-Host "TG push failed"
          }
        }

        # дё‹иЅЅе№¶е®‰иЈ… Tailscale
        $pkg="$env:TEMP\tailscale.msi"
        Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi -OutFile $pkg
        if(-not(Test-Path $pkg)){ SendTG "вќЊ Tailscale MSI download failed"; return }

        Start-Process msiexec.exe -ArgumentList "/i `"$pkg`" /quiet /norestart" -Wait

        $tsExe="$env:ProgramFiles\Tailscale\tailscale.exe"
        if(-not(Test-Path $tsExe)){ SendTG "вќЊ Tailscale exe not found after install"; return }

        # еђЇеЉЁ Tailscale
        try{
          $output = cmd /c "`"$tsExe`" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-rdp --reset --timeout=15s 2>&1"
        }catch{
          Write-Host "tailscale up failed, continuing"
        }

        $text = $output | Out-String
        Write-Host $text

        # AUTH_KEY е¤±ж•€ в†’ жЋЁйЂЃз™»еЅ•й“ѕжЋҐ
        $login=($text | Select-String -Pattern "https://login.tailscale.com/\S+" | ForEach-Object {$_.Matches.Value})
        if($login -and $login.Count -gt 0){
          SendTG "вљ пёЏ TAILSCALE LOGIN REQUIRED`n$($login[0])"
        }

        # иЋ·еЏ– Tailscale IP
        $ipList = & "$tsExe" ip -4 2>$null
        if($ipList -and $ipList.Count -gt 0){
          $ip=$ipList[0]
          echo "TSIP=$ip" >> $env:GITHUB_ENV
        }else{
          SendTG "вќЊ No Tailscale IP obtained"
        }

    # -----------------------------
    - name: Install Common Tools
      shell: powershell
      run: |
        choco install googlechrome -y
        choco install vscode -y

    # -----------------------------
    - name: Send RDP Info
      shell: powershell
      run: |
        function SendTG($msg){
          try{
            $url="https://tg-github-bot.greenwave1987.workers.dev/callback"
            $enc=[Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($msg))
            Invoke-RestMethod -Uri $url -Method Post -TimeoutSec 15 -ContentType "application/json" -Body (@{payload=$enc}|ConvertTo-Json)
          }catch{}
        }

        $ip=$env:TSIP
        $pass="${{ secrets.PASSWORD }}"
        $time="${{ github.event.client_payload.duration }}"
        if([string]::IsNullOrWhiteSpace($time)){ $time=60 }

        $msg="рџ–Ґ RDP READY`n`nIP: $ip`nUSER: RDP`nPASS: $pass`nTIME: $time MIN"
        SendTG $msg

    # -----------------------------
    - name: Keep Alive
      shell: powershell
      run: |
        $input="${{ github.event.client_payload.duration }}"
        if([string]::IsNullOrWhiteSpace($input)){ $duration=60 }else{ $duration=[int]$input }
        $end=(Get-Date).AddMinutes($duration)
        while((Get-Date)-lt $end){
          Write-Host "Alive $(Get-Date)"
          Start-Sleep 60
        }

    # -----------------------------
    - name: Cleanup
      if: always()
      shell: powershell
      run: |
        $tsExe="$env:ProgramFiles\Tailscale\tailscale.exe"
        if(Test-Path $tsExe){ & $tsExe logout }
