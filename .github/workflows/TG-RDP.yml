name: TG-RDP-Ultimate

on:
  repository_dispatch:
    types: [open_rdp]

jobs:

  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

    - name: Enable RDP
      shell: powershell
      run: |

        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force

        Set-ItemProperty `
        -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
        -Name "UserAuthentication" -Value 1 -Force

        netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null

        netsh advfirewall firewall add rule name="RDP-Tailscale" `
        dir=in action=allow protocol=TCP localport=3389 remoteip=100.64.0.0/10

        Restart-Service TermService -Force


    - name: Create RDP User
      shell: powershell
      run: |

        $password="${{ secrets.PASSWORD }}"

        Write-Host "::add-mask::$password"

        $secure=ConvertTo-SecureString $password -AsPlainText -Force

        if(-not(Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue)){

          New-LocalUser `
          -Name "RDP" `
          -Password $secure `
          -AccountNeverExpires

        }

        Add-LocalGroupMember Administrators RDP -ErrorAction SilentlyContinue
        Add-LocalGroupMember "Remote Desktop Users" RDP -ErrorAction SilentlyContinue


    - name: Install Tailscale
      shell: powershell
      run: |

        $CALLBACK="https://tg-github-bot.greenwave1987.workers.dev/callback"

        $url="https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
        $file="$env:TEMP\tailscale.msi"

        Invoke-WebRequest $url -OutFile $file

        Start-Process msiexec.exe -ArgumentList "/i `"$file`" /quiet /norestart" -Wait

        $ErrorActionPreference="Continue"

        $output=& "$env:ProgramFiles\Tailscale\tailscale.exe" up `
        --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" `
        --hostname="gh-rdp" `
        --reset 2>&1

        $text=$output|Out-String

        Write-Host $text

        $login=($text|Select-String "https://login.tailscale.com/\S+"|ForEach-Object{$_.Matches.Value})[0]

        if($login){

            $msg="TAILSCALE LOGIN:`n$login"

            $enc=[Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($msg))

            Invoke-RestMethod `
            -Uri $CALLBACK `
            -Method Post `
            -ContentType "application/json" `
            -Body (@{payload=$enc}|ConvertTo-Json)

        }

        Start-Sleep 10

        $ip=(& "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4)[0]

        echo "TSIP=$ip" >> $env:GITHUB_ENV


    - name: Install Tools
      shell: powershell
      run: |

        choco install googlechrome -y
        choco install vscode -y


    - name: Send RDP Info
      shell: powershell
      run: |

        $CALLBACK="https://tg-github-bot.greenwave1987.workers.dev/callback"

        $IP=$env:TSIP
        $PASS="${{ secrets.PASSWORD }}"
        $TIME="${{ github.event.client_payload.duration }}"

        if([string]::IsNullOrWhiteSpace($TIME)){
          $TIME=60
        }

        $msg=@"
        RDP READY
        
        IP: $IP
        USER: RDP
        PASS: $PASS
        TIME: $TIME MIN
        "@

        $enc=[Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($msg))

        Invoke-RestMethod `
        -Uri $CALLBACK `
        -Method Post `
        -ContentType "application/json" `
        -Body (@{payload=$enc}|ConvertTo-Json)


    - name: Keep Alive
      shell: powershell
      run: |

        $input="${{ github.event.client_payload.duration }}"

        if([string]::IsNullOrWhiteSpace($input)){
          $duration=60
        }else{
          $duration=[int]$input
        }

        $end=(Get-Date).AddMinutes($duration)

        Write-Host "Running until $end"

        while((Get-Date) -lt $end){

            Write-Host "Alive $(Get-Date)"

            Start-Sleep 60

        }


    - name: Cleanup
      if: always()
      shell: powershell
      run: |

        & "$env:ProgramFiles\Tailscale\tailscale.exe" logout
